// ---------- date helpers ----------
const toISO = (d) => d.toISOString().slice(0, 10);
const fmt = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" });
};
function upcomingWeekend(offsetWeeks = 0) {
  const now = new Date();
  const day = now.getDay();
  let toSat = (6 - day + 7) % 7;
  if (day === 0) toSat = 6;
  const sat = new Date(now);
  sat.setDate(now.getDate() + toSat + offsetWeeks * 7);
  const sun = new Date(sat);
  sun.setDate(sat.getDate() + 1);
  if (day === 0 && offsetWeeks === 0) {
    const today = new Date(now);
    const yest = new Date(now);
    yest.setDate(now.getDate() - 1);
    return { sat: toISO(yest), sun: toISO(today) };
  }
  return { sat: toISO(sat), sun: toISO(sun) };
}
const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36);

const sleep = (ms) => new Promise((res) => setTimeout(res, ms));

// >>> PASTE YOUR SUPABASE PROJECT VALUES HERE <<<
const SUPABASE_URL = "https://YOUR-PROJECT-ref.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-PUBLIC-ANON-KEY";
// Keys that belong to the whole team (shared in Supabase).
const SHARED_KEYS = ["katl:players", "katl:avail", "katl:matches", "katl:leaves", "katl:expenses"];

const supaConfigured = () =>
  SUPABASE_URL.startsWith("https://") && !SUPABASE_URL.includes("YOUR-PROJECT") && !SUPABASE_ANON_KEY.includes("YOUR-PUBLIC");

const supaHeaders = () => ({
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json",
});

async function storageReady() {
  if (!supaConfigured()) return true; // localStorage-only mode still "works"
  try {
    const r = await fetch(SUPABASE_URL + "/rest/v1/katl_store?select=k&limit=1", { headers: supaHeaders() });
    return r.ok;
  } catch { return false; }
}

const parseVal = (v, fallback) => {
  if (v === null || v === undefined) return fallback;
  if (typeof v === "string") { try { return JSON.parse(v); } catch { return fallback; } }
  return v;
};

// Local cache so the UI is instant and survives offline.
function lsGet(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw === null ? fallback : parseVal(raw, fallback); }
  catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

const isShared = (key) => SHARED_KEYS.includes(key);

async function loadKey(key, fallback) {
  // Personal keys (e.g. katl:me) never go to the shared backend.
  if (!isShared(key) || !supaConfigured()) return lsGet(key, fallback);
  try {
    const url = SUPABASE_URL + "/rest/v1/katl_store?select=v&k=eq." + encodeURIComponent(key);
    const r = await fetch(url, { headers: supaHeaders() });
    if (!r.ok) return lsGet(key, fallback);
    const rows = await r.json();
    if (rows.length && rows[0].v !== null && rows[0].v !== undefined) {
      lsSet(key, rows[0].v);        // refresh cache
      return rows[0].v;             // jsonb comes back already parsed
    }
    return lsGet(key, fallback);
  } catch { return lsGet(key, fallback); }
}

async function saveKey(key, value) {
  lsSet(key, value); // always cache locally first
  if (!isShared(key) || !supaConfigured()) return true;
  try {
    // Upsert on primary key k
    const url = SUPABASE_URL + "/rest/v1/katl_store?on_conflict=k";
    const r = await fetch(url, {
      method: "POST",
      headers: { ...supaHeaders(), "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify({ k: key, v: value, updated_at: new Date().toISOString() }),
    });
    return r.ok;
  } catch { return false; }
}

const unionById = (stored, local) => {
  const map = new Map();
  [...stored, ...local].forEach((x) => map.set(x.id, x));
  return [...map.values()];
};
const unionAvail = (stored, local) => {
  const out = { ...stored };
  Object.entries(local).forEach(([date, day]) => {
    out[date] = { ...(out[date] || {}), ...day };
  });
  return out;
};
async function loadMerged(key, fallback, kind = "array") {
  const remote = await loadKey(key, null);   // Supabase (or local fallback)
  const cached = lsGet(key, null);           // local cache
  if (remote === null && cached === null) return fallback;
  if (kind === "array") return unionById(remote || [], cached || []);
  return unionAvail(remote || {}, cached || {});
};
async function saveBoth(key, value) { return await saveKey(key, value); }

// Merge the official seed squad with whatever is stored.
// Same-name stored players keep their ids (so old availability/match
// records stay linked) but pick up the official role/nickname/rating.
function mergeWithSeed(loaded) {
  const byName = new Map();
  (loaded || []).forEach((pl) => byName.set(pl.name.trim().toLowerCase(), pl));
  const out = [];
  SEED_PLAYERS.forEach((sp) => {
    const ex = byName.get(sp.name.toLowerCase());
    if (ex) { out.push({ ...sp, id: ex.id }); byName.delete(sp.name.toLowerCase()); }
    else out.push(sp);
  });
  byName.forEach((pl) => out.push(pl));
  return out;
}

const STATUS = {
  in:    { label: "IN",    on: { background: "linear-gradient(90deg,#16a34a,#22c55e)" }, text: "text-green-400" },
  maybe: { label: "MAYBE", on: { background: "linear-gradient(90deg,#d97706,#FFB800)" }, text: "text-amber-400" },
  out:   { label: "OUT",   on: { background: "linear-gradient(90deg,#dc2626,#f43f5e)" }, text: "text-rose-400" },
};

const initials = (name) => name.trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase();

function Avatar({ name, size = 32, fontSize = 12 }) {
  return (
    <div className="rounded-full flex items-center justify-center shrink-0 kc-bebas"
      style={{ width: size, height: size, fontSize, border: `2px solid ${ORANGE}`, background: "rgba(255,107,26,0.12)", color: ORANGE }}>
      {initials(name)}
    </div>
  );
}

function Card({ children, className = "", style = {} }) {
  return (
    <div className={`rounded-xl ${className}`} style={{ background: CARD, border: `1px solid ${BORDER}`, ...style }}>
      {children}
    </div>
  );
}

const inputStyle = {
  background: "#0f0f0f", border: "1px solid rgba(255,255,255,0.14)", color: "#f0ede8",
  borderRadius: 8, padding: "8px 12px", width: "100%", marginTop: 4, colorScheme: "dark",
};
const btnOrange = {
  background: `linear-gradient(90deg, ${ORANGE}, #ff8c42)`, color: "#fff",
  borderRadius: 10, boxShadow: "0 2px 10px rgba(255,107,26,0.35)",
};

function App() {
  const [tab, setTab] = useState("weekend");
  const [loading, setLoading] = useState(true);
  const [players, setPlayers] = useState([]);
  const [avail, setAvail] = useState({});
  const [matches, setMatches] = useState([]);
  const [leaves, setLeaves] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [me, setMe] = useState(null);
  const [weekOffset, setWeekOffset] = useState(0);
  const [toast, setToast] = useState(null);
  const [storageOk, setStorageOk] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [saveVerified, setSaveVerified] = useState(null);

  const weekend = useMemo(() => upcomingWeekend(weekOffset), [weekOffset]);

  async function reloadAll() {
    setSyncing(true);
    const ready = await storageReady();
    setStorageOk(ready);
    if (ready) {
      let verified = false;
      try {
        if (supaConfigured()) {
          verified = await storageReady();
        } else {
          const stamp = String(Date.now());
          localStorage.setItem("katl-selftest", stamp);
          verified = localStorage.getItem("katl-selftest") === stamp;
        }
      } catch {}
      setSaveVerified(verified);

      const [p, a, m, l, ex, meStored] = await Promise.all([
        loadMerged("katl:players", []),
        loadMerged("katl:avail", {}, "object"),
        loadMerged("katl:matches", []),
        loadMerged("katl:leaves", []),
        loadMerged("katl:expenses", []),
        loadKey("katl:me", null),
      ]);
      const squad = mergeWithSeed(p);
      setPlayers((cur) => mergeWithSeed(unionById(squad, cur)));
      setAvail((cur) => unionAvail(a, cur));
      setMatches((cur) => unionById(m, cur));
      setLeaves((cur) => unionById(l, cur));
      setExpenses((cur) => unionById(ex, cur));
      if (meStored) setMe(meStored);
      saveBoth("katl:players", squad);
      setLastSync(new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }));
    }
    setSyncing(false);
    setLoading(false);
  }

  useEffect(() => { reloadAll(); }, []);

  const ping = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  async function addPlayer(name, role) {
    const fresh = mergeWithSeed(await loadMerged("katl:players", []));
    const base = unionById(fresh, players);
    if (base.some((p) => p.name.toLowerCase() === name.toLowerCase())) { ping("Player already exists"); setPlayers(base); return; }
    const next = [...base, { id: uid(), name, role: role || "" }];
    setPlayers(next);
    const ok = await saveBoth("katl:players", next);
    ping(ok ? `${name} added to squad` : "Couldn't save — please try again");
  }
  async function removePlayer(id) {
    const fresh = await loadMerged("katl:players", []);
    const next = unionById(fresh, players).filter((p) => p.id !== id);
    setPlayers(next);
    if (!(await saveBoth("katl:players", next))) ping("Couldn't save — please try again");
  }
  async function setStatus(dateISO, playerId, status) {
    const fresh = await loadMerged("katl:avail", {}, "object");
    const base = unionAvail(fresh, avail);
    const day = { ...(base[dateISO] || {}) };
    if (day[playerId] === status) delete day[playerId]; else day[playerId] = status;
    const next = { ...base, [dateISO]: day };
    setAvail(next);
    if (!(await saveBoth("katl:avail", next))) ping("Couldn't save — please try again");
  }
  async function addMatch(m) {
    const fresh = await loadMerged("katl:matches", []);
    const next = [...unionById(fresh, matches), m].sort((a, b) => b.date.localeCompare(a.date));
    setMatches(next);
    const ok = await saveBoth("katl:matches", next);
    ping(ok ? "Match logged" : "Couldn't save — please try again");
  }
  async function deleteMatch(id) {
    const fresh = await loadMerged("katl:matches", []);
    const next = unionById(fresh, matches).filter((m) => m.id !== id);
    setMatches(next);
    if (!(await saveBoth("katl:matches", next))) ping("Couldn't save — please try again");
  }
  async function addLeave(l) {
    const fresh = await loadMerged("katl:leaves", []);
    const next = [...unionById(fresh, leaves), l].sort((a, b) => a.from.localeCompare(b.from));
    setLeaves(next);
    const ok = await saveBoth("katl:leaves", next);
    ping(ok ? "Leave added" : "Couldn't save — please try again");
  }
  async function deleteLeave(id) {
    const fresh = await loadMerged("katl:leaves", []);
    const next = unionById(fresh, leaves).filter((l) => l.id !== id);
    setLeaves(next);
    if (!(await saveBoth("katl:leaves", next))) ping("Couldn't save — please try again");
  }
  async function addExpense(ex) {
    const fresh = await loadMerged("katl:expenses", []);
    const next = [...unionById(fresh, expenses), ex].sort((a, b) => b.date.localeCompare(a.date));
    setExpenses(next);
    const ok = await saveBoth("katl:expenses", next);
    ping(ok ? "Expense added" : "Couldn't save — please try again");
  }
  async function deleteExpense(id) {
    const fresh = await loadMerged("katl:expenses", []);
    const next = unionById(fresh, expenses).filter((e) => e.id !== id);
    setExpenses(next);
    if (!(await saveBoth("katl:expenses", next))) ping("Couldn't save — please try again");
  }
  async function chooseMe(id) { setMe(id); await saveKey("katl:me", id); }

  const onLeave = (playerId, dateISO) =>
    leaves.some((l) => l.playerId === playerId && l.from <= dateISO && dateISO <= l.to);

  if (loading) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-4 kc-body" style={{ background: "#080808" }}>
        <style>{FONT_CSS}</style>
        <img src={KATL_LOGO} alt="KATL" style={{ width: 110 }} />
        <div className="text-neutral-500 kc-display tracking-widest uppercase">Loading the scoreboard…</div>
      </div>
    );
  }

  return (
    <div className="min-h-screen kc-body" style={{ background: "#080808", color: "#f0ede8" }}>
      <style>{FONT_CSS}</style>

      {/* Header */}
      <header style={{ background: "radial-gradient(ellipse 90% 100% at 50% -20%, rgba(255,107,26,0.28) 0%, #0a0a0a 70%)", borderBottom: `1px solid ${BORDER}` }}>
        <div className="max-w-3xl mx-auto px-4 pt-5 pb-3">
          <div className="flex items-end justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-3">
              <img src={KATL_LOGO} alt="KATL logo" style={{ width: 66, filter: "drop-shadow(0 0 14px rgba(255,107,26,0.5))" }} />
              <div>
                <div className="text-[10px] uppercase font-semibold" style={{ color: GOLD, letterSpacing: "0.3em" }}>Weekend Cricket Club</div>
                <h1 className="kc-bebas leading-none" style={{ fontSize: 52, letterSpacing: 4 }}>
                  KATL <span style={{ color: ORANGE }}>CRICKET</span>
                </h1>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <ScoreStrip players={players} avail={avail} weekend={weekend} onLeave={onLeave} />
              <button onClick={reloadAll} title="Refresh team data" disabled={syncing}
                className="rounded-xl px-3 py-2 text-lg disabled:opacity-50"
                style={{ border: `1px solid ${BORDER}`, background: "rgba(0,0,0,0.4)", color: GOLD }}>
                {syncing ? "…" : "⟳"}
              </button>
            </div>
          </div>
        </div>
        <nav className="max-w-3xl mx-auto px-4 flex gap-0 overflow-x-auto">
          {[
            ["weekend", "This Weekend"],
            ["matches", "Matches"],
            ["expenses", "Expenses"],
            ["stats", "Stats"],
            ["leaves", "Leaves"],
            ["squad", "Squad"],
          ].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)}
              className="kc-display uppercase whitespace-nowrap px-4 py-3 text-sm font-semibold transition-colors"
              style={{
                letterSpacing: 2,
                color: tab === id ? ORANGE : "#888",
                borderBottom: tab === id ? `2px solid ${ORANGE}` : "2px solid transparent",
              }}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      {!storageOk ? (
        <div className="text-white text-sm text-center px-4 py-2" style={{ background: "#dc2626" }}>
          ⚠️ Storage NOT connected — changes will be lost when you close the app. Tap ⟳ above to retry.
        </div>
      ) : (
        <div className="text-[11px] text-center px-4 py-1" style={{ background: "rgba(255,107,26,0.1)", color: "#c9a", borderBottom: `1px solid ${BORDER}` }}>
          <span style={{ color: GOLD }}>{supaConfigured() ? "Team sync ON" : "Local only"} {saveVerified ? "✓" : ""}</span> · saves {saveVerified === null ? "checking…" : saveVerified ? "ok" : (supaConfigured() ? "BACKEND UNREACHABLE ✗" : "local ✓")} · {players.length} players · last sync {lastSync || "—"}
        </div>
      )}

      <main className="max-w-3xl mx-auto px-4 py-6 pb-24">
        {tab === "weekend" && (
          <WeekendTab weekend={weekend} weekOffset={weekOffset} setWeekOffset={setWeekOffset}
            players={players} avail={avail} setStatus={setStatus} me={me} chooseMe={chooseMe} onLeave={onLeave} />
        )}
        {tab === "matches" && (
          <MatchesTab players={players} matches={matches} avail={avail} addMatch={addMatch} deleteMatch={deleteMatch} />
        )}
        {tab === "stats" && <StatsTab players={players} matches={matches} avail={avail} />}
        {tab === "expenses" && <ExpensesTab players={players} matches={matches} expenses={expenses} addExpense={addExpense} deleteExpense={deleteExpense} me={me} />}
        {tab === "leaves" && <LeavesTab players={players} leaves={leaves} addLeave={addLeave} deleteLeave={deleteLeave} me={me} />}
        {tab === "squad" && <SquadTab players={players} addPlayer={addPlayer} removePlayer={removePlayer} me={me} chooseMe={chooseMe} matches={matches} />}
      </main>

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full text-sm pop"
          style={{ background: "#181818", border: `1px solid ${ORANGE}`, color: "#fff", boxShadow: "0 4px 20px rgba(255,107,26,0.3)" }}>
          {toast}
        </div>
      )}
    </div>
  );
}

// ---------- Header score strip ----------
function ScoreStrip({ players, avail, weekend, onLeave }) {
  const count = (dateISO) => {
    const day = avail[dateISO] || {};
    let inN = 0, outN = 0, maybeN = 0;
    players.forEach((p) => {
      const s = onLeave(p.id, dateISO) ? "out" : day[p.id];
      if (s === "in") inN++; else if (s === "out") outN++; else if (s === "maybe") maybeN++;
    });
    return { inN, outN, maybeN };
  };
  const sat = count(weekend.sat);
  const sun = count(weekend.sun);
  const Cell = ({ label, c }) => (
    <div className="text-center px-3">
      <div className="text-[10px] uppercase" style={{ color: "#998", letterSpacing: 2 }}>{label}</div>
      <div className="kc-bebas text-2xl tabular-nums" style={{ letterSpacing: 1 }}>
        <span className="text-green-400">{c.inN}</span>
        <span className="text-neutral-600 mx-1">/</span>
        <span style={{ color: GOLD }}>{c.maybeN}</span>
        <span className="text-neutral-600 mx-1">/</span>
        <span className="text-rose-400">{c.outN}</span>
      </div>
    </div>
  );
  return (
    <div className="flex rounded-xl py-1" style={{ border: `1px solid ${BORDER}`, background: "rgba(0,0,0,0.45)" }}>
      <Cell label={fmt(weekend.sat)} c={sat} />
      <div style={{ width: 1, background: BORDER }} />
      <Cell label={fmt(weekend.sun)} c={sun} />
    </div>
  );
}

// ---------- Weekend availability ----------
function WeekendTab({ weekend, weekOffset, setWeekOffset, players, avail, setStatus, me, chooseMe, onLeave }) {
  const [day, setDay] = useState("sat");
  const dateISO = weekend[day];
  const dayAvail = avail[dateISO] || {};
  const mePlayer = players.find((p) => p.id === me);

  const sorted = [...players].sort((a, b) => a.name.localeCompare(b.name));
  const groups = { in: [], maybe: [], out: [], none: [] };
  sorted.forEach((p) => {
    const s = onLeave(p.id, dateISO) ? "leave" : dayAvail[p.id];
    if (s === "leave") groups.out.push({ ...p, leave: true });
    else if (s) groups[s].push(p);
    else groups.none.push(p);
  });

  const navBtn = { border: "1px solid rgba(255,255,255,0.15)", background: CARD, color: "#ddd", borderRadius: 10 };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-2">
          <button onClick={() => setWeekOffset(Math.max(0, weekOffset - 1))} disabled={weekOffset === 0}
            className="px-3 py-1.5 disabled:opacity-40" style={navBtn}>←</button>
          <div className="kc-bebas text-2xl" style={{ letterSpacing: 2 }}>
            {weekOffset === 0 ? "THIS WEEKEND" : `IN ${weekOffset} WEEK${weekOffset > 1 ? "S" : ""}`}
          </div>
          <button onClick={() => setWeekOffset(weekOffset + 1)} className="px-3 py-1.5" style={navBtn}>→</button>
        </div>
        <div className="flex rounded-xl overflow-hidden" style={{ border: `1px solid ${BORDER}` }}>
          {["sat", "sun"].map((d) => (
            <button key={d} onClick={() => setDay(d)}
              className="px-4 py-1.5 kc-display text-base font-semibold uppercase"
              style={{ letterSpacing: 1, ...(day === d ? btnOrange : { background: CARD, color: "#999" }), borderRadius: 0 }}>
              {fmt(weekend[d])}
            </button>
          ))}
        </div>
      </div>

      {/* My quick response */}
      <Card className="p-4" style={{ borderColor: "rgba(255,107,26,0.45)" }}>
        {mePlayer ? (
          <>
            <div className="text-sm text-neutral-400 mb-2 flex items-center gap-2">
              <Avatar name={mePlayer.name} />
              <span>Marking for <span className="font-semibold text-white">{mePlayer.name}</span> · {fmt(dateISO)}</span>
              {onLeave(me, dateISO) && <span className="text-rose-400 font-medium">(on leave this day)</span>}
            </div>
            <div className="flex gap-2">
              {Object.entries(STATUS).map(([key, s]) => (
                <button key={key} onClick={() => setStatus(dateISO, me, key)}
                  className="flex-1 py-2.5 rounded-xl kc-bebas text-xl transition-all"
                  style={{
                    letterSpacing: 3,
                    ...(dayAvail[me] === key
                      ? { ...s.on, color: "#fff", border: "2px solid transparent" }
                      : { background: "#101010", border: "1px solid rgba(255,255,255,0.14)", color: "#999" }),
                  }}>
                  {s.label}
                </button>
              ))}
            </div>
          </>
        ) : (
          <div>
            <div className="text-sm text-neutral-400 mb-2">Who are you? Pick your name once and this device remembers it.</div>
            <div className="flex flex-wrap gap-2">
              {sorted.map((p) => (
                <button key={p.id} onClick={() => chooseMe(p.id)}
                  className="px-3 py-1.5 rounded-full text-sm flex items-center gap-1.5"
                  style={{ border: "1px solid rgba(255,255,255,0.15)", background: CARD, color: "#ddd" }}>
                  <Avatar name={p.name} size={20} fontSize={9} />{p.name}
                </button>
              ))}
            </div>
          </div>
        )}
      </Card>

      {/* Team sheet */}
      {["in", "maybe", "out", "none"].map((g) => {
        const list = groups[g];
        if (!list.length) return null;
        const titles = { in: "Available", maybe: "Maybe", out: "Not available / on leave", none: "Not responded yet" };
        const dotColors = { in: "#4ADE80", maybe: GOLD, out: "#f43f5e", none: "#555" };
        return (
          <div key={g}>
            <div className="kc-display text-base font-bold uppercase text-neutral-400 mb-2 flex items-center gap-2" style={{ letterSpacing: 2 }}>
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: dotColors[g] }} />
              {titles[g]} <span className="text-neutral-600">({list.length})</span>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {list.map((p) => (
                <div key={p.id} className="px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                  style={{ background: CARD, border: `1px solid ${g === "none" ? "rgba(255,255,255,0.08)" : BORDER}`, opacity: g === "none" ? 0.65 : 1 }}>
                  <Avatar name={p.name} size={24} fontSize={10} />
                  <span className="font-medium truncate text-neutral-200">{p.name}</span>
                  {p.leave && <span className="text-[10px] uppercase text-rose-400 ml-auto" style={{ letterSpacing: 1 }}>leave</span>}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Matches & attendance ----------
function MatchesTab({ players, matches, avail, addMatch, deleteMatch }) {
  const [open, setOpen] = useState(false);
  const [date, setDate] = useState(toISO(new Date()));
  const [opponent, setOpponent] = useState("");
  const [result, setResult] = useState("");
  const [played, setPlayed] = useState([]);

  const prefillFromAvail = () => {
    const day = avail[date] || {};
    setPlayed(players.filter((p) => day[p.id] === "in").map((p) => p.id));
  };
  const toggle = (id) => setPlayed((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);

  const save = () => {
    if (!played.length) return;
    addMatch({ id: uid(), date, opponent: opponent.trim(), result: result.trim(), played });
    setOpen(false); setOpponent(""); setResult(""); setPlayed([]);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div className="kc-bebas text-3xl" style={{ letterSpacing: 2 }}>MATCH <span style={{ color: ORANGE }}>LOG</span></div>
        <button onClick={() => setOpen(!open)} className="px-4 py-2 kc-display font-semibold uppercase" style={{ ...btnOrange, letterSpacing: 1 }}>
          {open ? "Cancel" : "+ Log a match"}
        </button>
      </div>

      {open && (
        <Card className="p-4 space-y-3 pop" style={{ borderColor: "rgba(255,107,26,0.45)" }}>
          <div className="grid grid-cols-2 gap-3">
            <label className="text-sm text-neutral-400">Date
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
            </label>
            <label className="text-sm text-neutral-400">Opponent (optional)
              <input value={opponent} onChange={(e) => setOpponent(e.target.value)} placeholder="e.g., Whitefield XI" style={inputStyle} />
            </label>
          </div>
          <label className="text-sm text-neutral-400 block">Result (optional)
            <input value={result} onChange={(e) => setResult(e.target.value)} placeholder="Won by 24 runs" style={inputStyle} />
          </label>
          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm font-medium text-neutral-300">Who played? ({played.length} selected)</div>
              <button onClick={prefillFromAvail} className="text-sm underline" style={{ color: GOLD }}>Prefill from availability</button>
            </div>
            <div className="flex flex-wrap gap-2">
              {[...players].sort((a, b) => a.name.localeCompare(b.name)).map((p) => (
                <button key={p.id} onClick={() => toggle(p.id)}
                  className="px-3 py-1.5 rounded-full text-sm transition-colors flex items-center gap-1.5"
                  style={played.includes(p.id)
                    ? { ...btnOrange, borderRadius: 999 }
                    : { border: "1px solid rgba(255,255,255,0.15)", background: "#101010", color: "#999" }}>
                  {p.name}
                </button>
              ))}
            </div>
          </div>
          <button onClick={save} disabled={!played.length}
            className="w-full py-2.5 kc-bebas text-xl disabled:opacity-40" style={{ ...btnOrange, letterSpacing: 3 }}>
            SAVE MATCH
          </button>
        </Card>
      )}

      {matches.length === 0 ? (
        <div className="text-neutral-500 text-center py-10">No matches logged yet. Log your first weekend game.</div>
      ) : (
        matches.map((m) => (
          <Card key={m.id} className="p-4" style={{ borderLeft: `3px solid ${ORANGE}` }}>
            <div className="flex items-start justify-between">
              <div>
                <div className="kc-display text-lg font-bold text-white" style={{ letterSpacing: 0.5 }}>
                  {fmt(m.date)}{m.opponent ? ` · vs ${m.opponent}` : ""}
                </div>
                {m.result && <div className="text-sm font-semibold" style={{ color: "#4ADE80" }}>{m.result}</div>}
              </div>
              <button onClick={() => { if (confirm("Delete this match?")) deleteMatch(m.id); }}
                className="text-neutral-500 hover:text-rose-400 text-sm">Delete</button>
            </div>
            <div className="mt-2 flex flex-wrap gap-1.5">
              {m.played.map((id) => {
                const p = players.find((x) => x.id === id);
                return p ? (
                  <span key={id} className="px-2 py-0.5 rounded-full text-xs"
                    style={{ background: "rgba(255,107,26,0.1)", color: "#ffb98a", border: `1px solid ${BORDER}` }}>{p.name}</span>
                ) : null;
              })}
            </div>
          </Card>
        ))
      )}
    </div>
  );
}

// ---------- Stats ----------
function StatsTab({ players, matches, avail }) {
  const stats = players.map((p) => {
    const playedN = matches.filter((m) => m.played.includes(p.id)).length;
    let ins = 0;
    Object.values(avail).forEach((day) => { if (day[p.id] === "in") ins++; });
    return { ...p, playedN, ins };
  }).sort((a, b) => b.playedN - a.playedN || a.name.localeCompare(b.name));

  const max = Math.max(1, ...stats.map((s) => s.playedN));
  const total = matches.length;
  const medal = (i) => (i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : null);

  return (
    <div className="space-y-4">
      <div className="flex items-baseline justify-between">
        <div className="kc-bebas text-3xl" style={{ letterSpacing: 2 }}>MATCHES <span style={{ color: ORANGE }}>PLAYED</span></div>
        <div className="text-sm text-neutral-500">{total} match{total === 1 ? "" : "es"} logged</div>
      </div>
      <Card>
        {stats.map((s, i) => (
          <div key={s.id} className="px-4 py-3 flex items-center gap-3" style={{ borderBottom: i < stats.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
            <div className="kc-bebas text-xl text-neutral-500 w-7 text-center">{medal(i) || i + 1}</div>
            <Avatar name={s.name} />
            <div className="flex-1 min-w-0">
              <div className="flex items-baseline justify-between">
                <span className="font-medium text-neutral-200 truncate">{s.name}</span>
                <span className="kc-bebas text-2xl tabular-nums" style={{ color: ORANGE }}>{s.playedN}</span>
              </div>
              <div className="h-1.5 rounded-full mt-1.5 overflow-hidden" style={{ background: "rgba(255,255,255,0.07)" }}>
                <div className="h-full rounded-full transition-all"
                  style={{ width: `${(s.playedN / max) * 100}%`, background: `linear-gradient(90deg, ${ORANGE}, ${GOLD})` }} />
              </div>
              <div className="text-[11px] text-neutral-500 mt-1">
                {total ? `${Math.round((s.playedN / total) * 100)}% of matches` : "—"} · said IN {s.ins} time{s.ins === 1 ? "" : "s"}
              </div>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ---------- Expenses & settle-up ----------
const EXPENSE_CATEGORIES = [
  { key: "ground", label: "Ground", icon: "🏟️" },
  { key: "balls", label: "Balls", icon: "🏏" },
  { key: "water", label: "Water/Drinks", icon: "💧" },
  { key: "food", label: "Food", icon: "🍽️" },
  { key: "kit", label: "Kit/Gear", icon: "🎽" },
  { key: "umpire", label: "Umpire", icon: "🧑‍⚖️" },
  { key: "travel", label: "Travel", icon: "🚗" },
  { key: "other", label: "Other", icon: "📦" },
];
const INR = (n) => "₹" + Number(n || 0).toLocaleString("en-IN", { maximumFractionDigits: 2 });

function ExpensesTab({ players, matches, expenses, addExpense, deleteExpense, me }) {
  const [open, setOpen] = useState(false);
  const [date, setDate] = useState(toISO(new Date()));
  const [matchId, setMatchId] = useState("");
  const [category, setCategory] = useState("ground");
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState("");
  const [paidBy, setPaidBy] = useState(me || "");
  const [splitAll, setSplitAll] = useState(true);
  const [splitWith, setSplitWith] = useState([]);

  const sortedPlayers = [...players].sort((a, b) => a.name.localeCompare(b.name));
  const playerName = (id) => players.find((p) => p.id === id)?.name || "—";

  const toggleSplit = (id) =>
    setSplitWith((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]));

  const reset = () => {
    setDesc(""); setAmount(""); setCategory("ground"); setMatchId("");
    setSplitAll(true); setSplitWith([]); setOpen(false);
  };

  const save = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0 || !paidBy) return;
    const sharers = splitAll ? players.map((p) => p.id) : splitWith;
    if (!sharers.length) return;
    addExpense({
      id: uid(), date, matchId: matchId || null, category,
      desc: desc.trim(), amount: amt, paidBy, sharers,
    });
    reset();
  };

  // ----- Settle-up calculation -----
  const { balances, totalSpend } = useMemo(() => {
    const bal = {};
    players.forEach((p) => (bal[p.id] = 0));
    let total = 0;
    expenses.forEach((e) => {
      total += e.amount;
      const sharers = (e.sharers || []).filter((id) => bal[id] !== undefined);
      if (!sharers.length) return;
      const share = e.amount / sharers.length;
      sharers.forEach((id) => (bal[id] -= share));      // each sharer owes their share
      if (bal[e.paidBy] !== undefined) bal[e.paidBy] += e.amount; // payer covered the whole bill
    });
    return { balances: bal, totalSpend: total };
  }, [expenses, players]);

  // Greedy settle-up: who pays whom
  const settlements = useMemo(() => {
    const creditors = [], debtors = [];
    Object.entries(balances).forEach(([id, v]) => {
      const r = Math.round(v * 100) / 100;
      if (r > 0.01) creditors.push({ id, amt: r });
      else if (r < -0.01) debtors.push({ id, amt: -r });
    });
    creditors.sort((a, b) => b.amt - a.amt);
    debtors.sort((a, b) => b.amt - a.amt);
    const out = [];
    let i = 0, j = 0;
    while (i < debtors.length && j < creditors.length) {
      const pay = Math.min(debtors[i].amt, creditors[j].amt);
      out.push({ from: debtors[i].id, to: creditors[j].id, amt: pay });
      debtors[i].amt -= pay; creditors[j].amt -= pay;
      if (debtors[i].amt < 0.01) i++;
      if (creditors[j].amt < 0.01) j++;
    }
    return out;
  }, [balances]);

  const matchLabel = (m) => `${fmt(m.date)}${m.opponent ? ` · vs ${m.opponent}` : ""}`;

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div className="kc-bebas text-3xl" style={{ letterSpacing: 2 }}>MATCH <span style={{ color: ORANGE }}>EXPENSES</span></div>
        <button onClick={() => { setPaidBy(me || ""); setOpen(!open); }} className="px-4 py-2 kc-display font-semibold uppercase" style={{ ...btnOrange, letterSpacing: 1 }}>
          {open ? "Cancel" : "+ Add expense"}
        </button>
      </div>

      {/* Total spend banner */}
      <Card className="p-4 flex items-center justify-between" style={{ borderColor: "rgba(255,107,26,0.4)" }}>
        <div>
          <div className="text-[11px] uppercase text-neutral-500" style={{ letterSpacing: 2 }}>Total team spend</div>
          <div className="kc-bebas text-4xl" style={{ color: GOLD }}>{INR(totalSpend)}</div>
        </div>
        <div className="text-right text-xs text-neutral-500">
          {expenses.length} entr{expenses.length === 1 ? "y" : "ies"}<br />
          across {new Set(expenses.map((e) => e.matchId).filter(Boolean)).size || "—"} match(es)
        </div>
      </Card>

      {/* Add form */}
      {open && (
        <Card className="p-4 space-y-3 pop" style={{ borderColor: "rgba(255,107,26,0.45)" }}>
          <div className="grid grid-cols-2 gap-3">
            <label className="text-sm text-neutral-400">Date
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
            </label>
            <label className="text-sm text-neutral-400">Link to match (optional)
              <select value={matchId} onChange={(e) => setMatchId(e.target.value)} style={inputStyle}>
                <option value="">No specific match</option>
                {matches.map((m) => <option key={m.id} value={m.id}>{matchLabel(m)}</option>)}
              </select>
            </label>
          </div>

          <div>
            <div className="text-sm text-neutral-400 mb-1">Category</div>
            <div className="flex flex-wrap gap-2">
              {EXPENSE_CATEGORIES.map((c) => (
                <button key={c.key} onClick={() => setCategory(c.key)}
                  className="px-3 py-1.5 rounded-full text-sm transition-colors"
                  style={category === c.key
                    ? { ...btnOrange, borderRadius: 999 }
                    : { border: "1px solid rgba(255,255,255,0.15)", background: "#101010", color: "#999" }}>
                  {c.icon} {c.label}
                </button>
              ))}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <label className="text-sm text-neutral-400">Amount (₹)
              <input type="number" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" style={inputStyle} />
            </label>
            <label className="text-sm text-neutral-400">Paid by
              <select value={paidBy} onChange={(e) => setPaidBy(e.target.value)} style={inputStyle}>
                <option value="">Select…</option>
                {sortedPlayers.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </label>
          </div>

          <label className="text-sm text-neutral-400 block">Description (optional)
            <input value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="e.g., 2 boxes of balls" style={inputStyle} />
          </label>

          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm font-medium text-neutral-300">Split between</div>
              <label className="text-sm flex items-center gap-2 cursor-pointer" style={{ color: GOLD }}>
                <input type="checkbox" checked={splitAll} onChange={(e) => setSplitAll(e.target.checked)} />
                Whole squad ({players.length})
              </label>
            </div>
            {!splitAll && (
              <div className="flex flex-wrap gap-2">
                {sortedPlayers.map((p) => (
                  <button key={p.id} onClick={() => toggleSplit(p.id)}
                    className="px-3 py-1.5 rounded-full text-sm transition-colors flex items-center gap-1.5"
                    style={splitWith.includes(p.id)
                      ? { background: "rgba(74,222,128,0.18)", color: "#4ADE80", border: "1px solid rgba(74,222,128,0.5)", borderRadius: 999 }
                      : { border: "1px solid rgba(255,255,255,0.15)", background: "#101010", color: "#999" }}>
                    {p.name}
                  </button>
                ))}
              </div>
            )}
            {amount > 0 && (
              <div className="text-xs text-neutral-500 mt-2">
                {INR(parseFloat(amount) / Math.max(1, splitAll ? players.length : splitWith.length))} per person
                {" · "}{splitAll ? players.length : splitWith.length} sharing
              </div>
            )}
          </div>

          <button onClick={save} disabled={!amount || parseFloat(amount) <= 0 || !paidBy || (!splitAll && !splitWith.length)}
            className="w-full py-2.5 kc-bebas text-xl disabled:opacity-40" style={{ ...btnOrange, letterSpacing: 3 }}>
            SAVE EXPENSE
          </button>
        </Card>
      )}

      {/* Settle-up */}
      {settlements.length > 0 && (
        <div>
          <div className="kc-display text-base font-bold uppercase text-neutral-400 mb-2" style={{ letterSpacing: 2 }}>
            💰 Settle up
          </div>
          <Card>
            {settlements.map((s, i) => (
              <div key={i} className="px-4 py-3 flex items-center gap-3"
                style={{ borderBottom: i < settlements.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                <Avatar name={playerName(s.from)} size={28} fontSize={11} />
                <span className="text-neutral-200 font-medium">{playerName(s.from)}</span>
                <span className="text-neutral-500">pays</span>
                <span className="kc-bebas text-xl ml-auto mr-3" style={{ color: GOLD }}>{INR(s.amt)}</span>
                <span className="text-neutral-500">→</span>
                <span className="text-neutral-200 font-medium">{playerName(s.to)}</span>
                <Avatar name={playerName(s.to)} size={28} fontSize={11} />
              </div>
            ))}
          </Card>
          <p className="text-xs text-neutral-600 mt-2">Minimum number of payments to square everyone up. Settlements update as you add or remove expenses.</p>
        </div>
      )}

      {/* Expense list */}
      <div>
        <div className="kc-display text-base font-bold uppercase text-neutral-400 mb-2" style={{ letterSpacing: 2 }}>
          All expenses ({expenses.length})
        </div>
        {expenses.length === 0 ? (
          <div className="text-neutral-500 text-center py-8">No expenses logged yet. Add your first match cost above.</div>
        ) : (
          <div className="space-y-2">
            {expenses.map((e) => {
              const cat = EXPENSE_CATEGORIES.find((c) => c.key === e.category) || EXPENSE_CATEGORIES[7];
              const m = matches.find((x) => x.id === e.matchId);
              const perHead = e.amount / Math.max(1, (e.sharers || []).length);
              return (
                <Card key={e.id} className="px-4 py-3" style={{ borderLeft: `3px solid ${ORANGE}` }}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex items-start gap-3 min-w-0">
                      <div className="text-2xl">{cat.icon}</div>
                      <div className="min-w-0">
                        <div className="font-medium text-neutral-100">
                          {cat.label}{e.desc ? <span className="text-neutral-400 font-normal"> · {e.desc}</span> : ""}
                        </div>
                        <div className="text-xs text-neutral-500 mt-0.5">
                          {fmt(e.date)}{m ? ` · vs ${m.opponent || "match"}` : ""} · paid by <span style={{ color: GOLD }}>{playerName(e.paidBy)}</span>
                        </div>
                        <div className="text-xs text-neutral-500">
                          {INR(perHead)}/head · split {(e.sharers || []).length} way{(e.sharers || []).length === 1 ? "" : "s"}
                        </div>
                      </div>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="kc-bebas text-2xl" style={{ color: ORANGE }}>{INR(e.amount)}</div>
                      <button onClick={() => { if (confirm("Delete this expense?")) deleteExpense(e.id); }}
                        className="text-neutral-600 hover:text-rose-400 text-xs">Delete</button>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Leaves ----------
function LeavesTab({ players, leaves, addLeave, deleteLeave, me }) {
  const [playerId, setPlayerId] = useState(me || "");
  const [from, setFrom] = useState(toISO(new Date()));
  const [to, setTo] = useState(toISO(new Date()));
  const [note, setNote] = useState("");

  const save = () => {
    if (!playerId || !from || !to || to < from) return;
    addLeave({ id: uid(), playerId, from, to, note: note.trim() });
    setNote("");
  };
  const today = toISO(new Date());
  const upcoming = leaves.filter((l) => l.to >= today);
  const past = leaves.filter((l) => l.to < today);

  const LeaveRow = ({ l, dim }) => {
    const p = players.find((x) => x.id === l.playerId);
    return (
      <Card className="px-4 py-3 flex items-center justify-between" style={{ borderLeft: `3px solid ${GOLD}`, opacity: dim ? 0.5 : 1 }}>
        <div className="flex items-center gap-3">
          {p && <Avatar name={p.name} />}
          <div>
            <div className="font-medium text-neutral-200">{p?.name || "Unknown"}</div>
            <div className="text-sm text-neutral-500">
              {fmt(l.from)}{l.from !== l.to ? ` → ${fmt(l.to)}` : ""}{l.note ? ` · ${l.note}` : ""}
            </div>
          </div>
        </div>
        <button onClick={() => { if (confirm("Delete this leave?")) deleteLeave(l.id); }}
          className="text-neutral-500 hover:text-rose-400 text-sm">Delete</button>
      </Card>
    );
  };

  return (
    <div className="space-y-5">
      <Card className="p-4 space-y-3" style={{ borderColor: "rgba(255,184,0,0.35)" }}>
        <div className="kc-bebas text-3xl" style={{ letterSpacing: 2 }}>PLAN A <span style={{ color: GOLD }}>LEAVE</span></div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <label className="text-sm text-neutral-400">Player
            <select value={playerId} onChange={(e) => setPlayerId(e.target.value)} style={inputStyle}>
              <option value="">Select…</option>
              {[...players].sort((a, b) => a.name.localeCompare(b.name)).map((p) => (
                <option key={p.id} value={p.id}>{p.name}</option>
              ))}
            </select>
          </label>
          <label className="text-sm text-neutral-400">From
            <input type="date" value={from} onChange={(e) => { setFrom(e.target.value); if (to < e.target.value) setTo(e.target.value); }} style={inputStyle} />
          </label>
          <label className="text-sm text-neutral-400">To
            <input type="date" value={to} min={from} onChange={(e) => setTo(e.target.value)} style={inputStyle} />
          </label>
        </div>
        <label className="text-sm text-neutral-400 block">Note (optional)
          <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Travelling to hometown" style={inputStyle} />
        </label>
        <button onClick={save} disabled={!playerId || to < from}
          className="px-5 py-2 kc-display font-semibold uppercase disabled:opacity-40" style={{ ...btnOrange, letterSpacing: 1 }}>
          Add leave
        </button>
        <p className="text-xs text-neutral-600">Players on leave show as OUT automatically on the weekend sheet for those dates.</p>
      </Card>

      <div>
        <div className="kc-display text-base font-bold uppercase text-neutral-400 mb-2" style={{ letterSpacing: 2 }}>Upcoming ({upcoming.length})</div>
        {upcoming.length ? <div className="space-y-2">{upcoming.map((l) => <LeaveRow key={l.id} l={l} />)}</div>
          : <div className="text-neutral-600 text-sm">No upcoming leaves.</div>}
      </div>
      {past.length > 0 && (
        <div>
          <div className="kc-display text-base font-bold uppercase text-neutral-500 mb-2" style={{ letterSpacing: 2 }}>Past</div>
          <div className="space-y-2">{past.map((l) => <LeaveRow key={l.id} l={l} dim />)}</div>
        </div>
      )}
    </div>
  );
}

// ---------- Squad ----------
function SquadTab({ players, addPlayer, removePlayer, me, chooseMe, matches }) {
  const [name, setName] = useState("");
  const [role, setRole] = useState("");
  const submit = () => {
    const n = name.trim();
    if (!n) return;
    addPlayer(n, role.trim()); setName(""); setRole("");
  };
  return (
    <div className="space-y-5">
      <div className="kc-bebas text-3xl" style={{ letterSpacing: 2 }}>THE <span style={{ color: ORANGE }}>SQUAD</span> <span className="text-neutral-500 text-xl">({players.length})</span></div>

      <div className="space-y-2">
        {players.map((p) => {
          const playedN = matches.filter((m) => m.played.includes(p.id)).length;
          return (
            <Card key={p.id} className="px-4 py-3 flex items-center justify-between gap-2">
              <div className="flex items-center gap-3 min-w-0">
                <Avatar name={p.name} size={40} fontSize={15} />
                <div className="min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="kc-display font-bold text-white" style={{ fontSize: 17, letterSpacing: 0.5 }}>{p.name}</span>
                    {p.ovr && (
                      <span className="kc-bebas rounded-full flex items-center justify-center"
                        style={{ width: 24, height: 24, fontSize: 13, background: ORANGE, color: "#fff" }}>{p.ovr}</span>
                    )}
                    {me === p.id && <span className="text-[10px] uppercase px-2 py-0.5 rounded-full" style={{ background: "rgba(74,222,128,0.15)", color: "#4ADE80", letterSpacing: 1 }}>You</span>}
                  </div>
                  {p.role && (
                    <span className="inline-block text-[10px] font-bold uppercase px-2 py-0.5 rounded mt-1"
                      style={{ background: "rgba(255,107,26,0.12)", color: ORANGE, letterSpacing: 1 }}>{p.role}</span>
                  )}
                  <div className="text-xs text-neutral-500 mt-0.5">
                    {p.nick ? <span className="italic" style={{ color: GOLD }}>"{p.nick}"</span> : null}
                    {p.nick ? " · " : ""}{playedN} match{playedN === 1 ? "" : "es"}
                  </div>
                </div>
              </div>
              <div className="flex flex-col items-end gap-1 text-sm shrink-0">
                {me !== p.id && <button onClick={() => chooseMe(p.id)} style={{ color: "#4ADE80" }} className="hover:underline">This is me</button>}
                <button onClick={() => { if (confirm(`Remove ${p.name} from the squad?`)) removePlayer(p.id); }}
                  className="text-neutral-600 hover:text-rose-400">Remove</button>
              </div>
            </Card>
          );
        })}
      </div>

      <Card className="p-4">
        <div className="kc-display text-base font-bold uppercase text-neutral-300 mb-2" style={{ letterSpacing: 2 }}>Add a player</div>
        <div className="flex flex-col sm:flex-row gap-2">
          <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()}
            placeholder="Player name" style={{ ...inputStyle, marginTop: 0, flex: 1 }} />
          <input value={role} onChange={(e) => setRole(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()}
            placeholder="Role (optional)" style={{ ...inputStyle, marginTop: 0, flex: 1 }} />
          <button onClick={submit} className="px-5 py-2 kc-display font-semibold uppercase" style={{ ...btnOrange, letterSpacing: 1 }}>Add</button>
        </div>
      </Card>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
